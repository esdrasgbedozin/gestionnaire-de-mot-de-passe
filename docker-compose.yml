services:
  # Base de données PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: password_manager_db
    environment:
      POSTGRES_DB: password_manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (see .env)}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Port removed for security - database only accessible from internal network
    # ports:
    #   - "5432:5432"
    networks:
      - password_manager_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d password_manager"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Flask
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: password_manager_backend
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required (see .env)}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required (see .env)}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required (see .env)}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (see .env)}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8080:5000"
    volumes:
      - ./backend:/app
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - password_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: password_manager_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
      - PROXY=http://backend:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - password_manager_network
    restart: unless-stopped

  # Redis — session key store (VMK en mémoire, Lot 3/C1). SANS persistance disque.
  redis:
    image: redis:7-alpine
    container_name: password_manager_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - password_manager_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  password_manager_network:
    driver: bridge

volumes:
  postgres_data:
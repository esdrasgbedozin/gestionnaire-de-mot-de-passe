events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Sécurité : masquer la version nginx. Les EN-TÊTES de sécurité sont
    # centralisés dans security-headers.conf (source unique) et inclus par bloc.
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    # Upstream Backend
    upstream backend {
        server backend:5000;
    }

    # Upstream Frontend
    upstream frontend {
        server frontend:3000;
    }

    # Redirection HTTP vers HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Configuration HTTPS Principal
    server {
        listen 443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # En-têtes de sécurité (source unique) — appliqués aux blocs sans add_header propre.
        include /etc/nginx/security-headers.conf;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Frontend - Interface utilisateur
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache pour les assets statiques
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                # Ce bloc déclare un add_header (Cache-Control) -> il faut RÉ-INCLURE
                # les en-têtes de sécurité, sinon nginx les perd pour les assets.
                include /etc/nginx/security-headers.conf;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # API Backend - Authentification (Rate limiting strict)
        location /api/auth/ {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # add_header propres -> ré-inclure les en-têtes de sécurité.
            include /etc/nginx/security-headers.conf;
            # Données d'authentification jamais mises en cache
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # API Backend - Autres endpoints (données du coffre, déchiffrées)
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # add_header propres -> ré-inclure les en-têtes de sécurité.
            include /etc/nginx/security-headers.conf;
            # Réponses du coffre JAMAIS mises en cache (durcit vs l'ancien Flask :
            # no-store désormais sur TOUT /api/, pas seulement /api/auth/).
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # Timeout
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health Check
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # Sécurité - Bloquer les fichiers sensibles
        location ~ /\.(ht|git|env) {
            deny all;
        }

        # Sécurité - Bloquer les endpoints admin en production
        location /api/admin/ {
            # Permettre seulement depuis certaines IPs
            allow 192.168.1.0/24;  # Réseau local
            allow 10.0.0.0/8;      # Réseau privé
            deny all;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # add_header propres -> ré-inclure les en-têtes de sécurité + no-store (tout /api/).
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
    }
}

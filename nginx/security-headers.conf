# En-têtes de sécurité — SOURCE UNIQUE (Lot 6 / HSTS).
#
# Rappel nginx : un bloc (server/location) qui déclare un `add_header` IGNORE
# tous les add_header hérités du parent. Ce fichier regroupe donc l'intégralité
# des en-têtes et est RÉ-INCLUS dans chaque bloc qui ajoute son propre en-tête
# (ex. Cache-Control) — pour ne jamais perdre un en-tête au passage.
#
# Reprend 100 % de ce que Flask émettait auparavant (Flask s'abstient désormais
# en production, cf. security_headers.py). HSTS SANS preload (engagement non
# souhaité tant que le domaine est un placeholder).

add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=(), autoplay=(), display-capture=(), fullscreen=(self), clipboard-write=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
